<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UPS WebAR Demo</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #000;
  }

  model-viewer {
    width: 100vw;
    height: 100vh;

    background:
    radial-gradient(circle at center,
    #e6e7e5 0%,
    #e2e5e8 35%,
    #cfd6df 60%,
    #aab5c7 82%,
    #5b6a82 100%);
  }

  .titulo {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    z-index: 10;
  }

  .titulo h1 {
    margin: 0;
    font-size: 28px;
  }

  .titulo p {
    margin-top: 5px;
    opacity: 0.7;
  }

  #btnAR {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);

    padding: 15px 30px;

    border: none;
    border-radius: 12px;

    background: #2563eb;
    color: white;

    font-size: 16px;
    font-weight: bold;

    cursor: pointer;

    z-index: 100;
  }

  #btnAR:hover {
    background: #1d4ed8;
  }
</style>
</head>

<body>

  <div class="titulo">
    <h1>UPS RSMART</h1>
    <p>Experiencia WebAR</p>
  </div>

<model-viewer
    id="visorAR"
    src="textura modelado prueba RSMART.glb"

    ar
    ar-modes="scene-viewer webxr quick-look"

    camera-controls
    auto-rotate

    shadow-intensity="1"
    exposure="1"

    environment-image="neutral"
    tone-mapping="neutral"

    style="background: radial-gradient(circle at center,
#e6e7e5 0%,
#e2e5e8 35%,
#cfd6df 60%,
#aab5c7 82%,
#5b6a82 100%);">
</model-viewer>

<button id="btnAR">
VER EN TU ESPACIO
</button>
<script>
const botonAR = document.getElementById("btnAR");
const visor = document.getElementById("visorAR");

botonAR.addEventListener("click", async () => {
  if (visor.activateAR) {
    visor.activateAR();
  }
});
</script>
</body>
</html>
