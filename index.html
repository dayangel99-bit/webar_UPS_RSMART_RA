<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UPS WebAR Demo</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;

      background:
      radial-gradient(circle at center,
      #e6e7e5 0%,
      #e2e5e8 35%,
      #cfd6df 60%,
      #aab5c7 82%,
      #5b6a82 100%);
    }

    .titulo {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      z-index: 10;
    }

    .titulo h1 {
      margin: 0;
      font-size: 28px;
    }

    .titulo p {
      margin-top: 5px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="titulo">
    <h1>UPS RSMART</h1>
    <p>Experiencia WebAR</p>
  </div>

  <model-viewer
    src="8RA_UPS_RSMAT_demo.glb"

    ar
    ar-modes="webxr scene-viewer quick-look"

    ar-placement="floor"
    ar-scale="fixed"

    camera-controls
    auto-rotate

    shadow-intensity="1.2"
    shadow-softness="1"

    exposure="1"
    environment-image="neutral"
    tone-mapping="neutral"

    interaction-prompt="auto"

    camera-orbit="45deg 75deg 2.5m"
    min-camera-orbit="auto auto 1m"
    max-camera-orbit="auto auto 5m">

  </model-viewer>

</body>
</html>
